name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Run tests
        run: mvn -B clean test

      - name: Verify package builds
        run: |
          mvn -B package \
            -DskipTests \
            -Dmaven.javadoc.skip=true
        # ↑ skip javadoc in CI — it's only needed for publishing
        # Tests already ran in the previous step