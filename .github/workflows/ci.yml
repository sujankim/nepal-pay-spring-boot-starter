name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:

  build-core:
    name: Build and Install Core (Java 17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Install parent POM
        # -N = non-recursive, installs root pom only
        run: ./mvnw install -N

      - name: Install core
        # install (not just test) so starters can resolve it
        run: ./mvnw clean install -pl nepal-pay-core

  test-boot3:
    name: Test Spring Boot 3 Starter (Java 17)
    runs-on: ubuntu-latest
    needs: build-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Install parent and core
        run: |
          ./mvnw install -N
          ./mvnw clean install -pl nepal-pay-core -DskipTests

      - name: Test Boot 3 starter
        run: ./mvnw clean test -pl nepal-pay-spring-boot-3-starter

  test-boot4:
    name: Test Spring Boot 4 Starter (Java 21)
    runs-on: ubuntu-latest
    needs: build-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install parent and core
        run: |
          ./mvnw install -N
          ./mvnw clean install -pl nepal-pay-core -DskipTests

      - name: Test Boot 4 starter
        run: ./mvnw clean test -pl nepal-pay-spring-boot-4-starter