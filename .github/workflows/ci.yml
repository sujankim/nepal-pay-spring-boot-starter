name: CI

# ── Action runtime note ───────────────────────────────────────────────────
# actions/checkout@v5 and actions/setup-java@v5 use Node.js 24 as their
# internal ACTION RUNTIME (the engine that runs the action's own code).
# This is NOT the Node.js version available to your workflow job steps.
#
# What this means:
#   Java build steps are completely unaffected
#   No Node.js is exposed to the job environment by these actions
#    If a job needs a specific Node.js version, use actions/setup-node
#
# Why v5 is safe here:
#   All jobs use runs-on: ubuntu-latest (GitHub-hosted runners).
#   GitHub-hosted runners are always updated and already meet the
#   minimum runner version 2.327.1+ required by v5 actions.
#
# persist-credentials: false — security hardening (zizmor finding):
#   actions/checkout writes the GitHub token to local git config by default.
#   These jobs run Maven builds immediately after checkout — no git auth
#   is needed after that point. Disabling credential persistence prevents
#   the token from being leaked via Maven build artifacts or logs.
#
# Reference:
#   https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
# ─────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:

  # ── Step 1: Build and install core ──────────────────────────────────────
  build-core:
    name: Build and Install Core (Java 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Install parent POM
        run: ./mvnw install -N -q

      - name: Install core
        run: ./mvnw clean install -pl nepal-pay-core -q

  # ── Step 2a: Test Spring Boot 3 starter ─────────────────────────────────
  test-boot3:
    name: Test Spring Boot 3 Starter (Java 17)
    runs-on: ubuntu-latest
    needs: build-core

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Install parent and core
        run: |
          ./mvnw install -N -q
          ./mvnw clean install -pl nepal-pay-core -DskipTests -q

      - name: Test Boot 3 starter
        run: ./mvnw clean test -pl nepal-pay-spring-boot-3-starter

      - name: Verify Boot 3 package builds
        run: |
          ./mvnw package \
            -pl nepal-pay-spring-boot-3-starter \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -q

  # ── Step 2b: Test Spring Boot 4 starter ─────────────────────────────────
  test-boot4:
    name: Test Spring Boot 4 Starter (Java 21)
    runs-on: ubuntu-latest
    needs: build-core

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Install parent and core
        run: |
          ./mvnw install -N -q
          ./mvnw clean install -pl nepal-pay-core -DskipTests -q

      - name: Test Boot 4 starter
        run: ./mvnw clean test -pl nepal-pay-spring-boot-4-starter

      - name: Verify Boot 4 package builds
        run: |
          ./mvnw package \
            -pl nepal-pay-spring-boot-4-starter \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -q

  # ── Step 2c: Test Reactive starter ──────────────────────────────────────
  test-reactive:
    name: Test Reactive Starter (Java 17)
    runs-on: ubuntu-latest
    needs: build-core

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Install parent and core
        run: |
          ./mvnw install -N -q
          ./mvnw clean install -pl nepal-pay-core -DskipTests -q

      - name: Test Reactive starter
        run: ./mvnw clean test -pl nepal-pay-spring-boot-reactive-starter

      - name: Verify Reactive package builds
        run: |
          ./mvnw package \
            -pl nepal-pay-spring-boot-reactive-starter \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -q