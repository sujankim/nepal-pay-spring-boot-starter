name: Publish to Maven Central

# Triggered when you publish a GitHub Release.
# Go to: GitHub → Releases → Draft a new release → Publish release
on:
  release:
    types: [ published ]

permissions:
  contents: read

jobs:

  # ── Step 1: Build and publish core ────────────────────────────────
  publish-core:
    name: Publish Core (Java 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      # Import GPG private key from GitHub Secret
      # The key content is stored as a multi-line secret (the .asc file)
      - name: Import GPG private key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      # Write Maven settings.xml with Central Portal credentials
      # central server ID must match publishingServerId in pom.xml
      - name: Write Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.CENTRAL_TOKEN_USERNAME}</username>
                <password>${env.CENTRAL_TOKEN_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Install parent POM
        run: ./mvnw install -N -q

      # Deploy core to Maven Central
      # -P release activates GPG signing profile
      # -Dgpg.passphrase passes passphrase without interactive prompt
      - name: Publish nepal-pay-core
        run: |
          ./mvnw deploy \
            -pl nepal-pay-core \
            -P release \
            -Dgpg.passphrase="${{ secrets.GPG_PASSPHRASE }}" \
            -DskipTests \
            --no-transfer-progress
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}

  # ── Step 2a: Publish Boot 3 starter ───────────────────────────────
  publish-boot3:
    name: Publish Spring Boot 3 Starter (Java 17)
    runs-on: ubuntu-latest
    needs: publish-core   # wait for core to be published first

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Import GPG private key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Write Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.CENTRAL_TOKEN_USERNAME}</username>
                <password>${env.CENTRAL_TOKEN_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Install parent and core
        run: |
          ./mvnw install -N -q
          ./mvnw clean install -pl nepal-pay-core -DskipTests -q

      - name: Publish Boot 3 starter
        run: |
          ./mvnw deploy \
            -pl nepal-pay-spring-boot-3-starter \
            -P release \
            -Dgpg.passphrase="${{ secrets.GPG_PASSPHRASE }}" \
            -DskipTests \
            --no-transfer-progress
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}

  # ── Step 2b: Publish Boot 4 starter ───────────────────────────────
  publish-boot4:
    name: Publish Spring Boot 4 Starter (Java 21)
    runs-on: ubuntu-latest
    needs: publish-core   # wait for core, run parallel with boot3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Import GPG private key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Write Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.CENTRAL_TOKEN_USERNAME}</username>
                <password>${env.CENTRAL_TOKEN_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Install parent and core
        run: |
          ./mvnw install -N -q
          ./mvnw clean install -pl nepal-pay-core -DskipTests -q

      - name: Publish Boot 4 starter
        run: |
          ./mvnw deploy \
            -pl nepal-pay-spring-boot-4-starter \
            -P release \
            -Dgpg.passphrase="${{ secrets.GPG_PASSPHRASE }}" \
            -DskipTests \
            --no-transfer-progress
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}