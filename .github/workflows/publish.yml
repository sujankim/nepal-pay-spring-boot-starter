name: Publish to Maven Central

# ── Action version note ──────────────────────────────────────────────────
# actions/checkout@v5 and actions/setup-java@v5 require
# Actions runner 2.327.1+ (Node.js 24).
#
# This is safe for NepalPay because ALL jobs use runs-on: ubuntu-latest
# (GitHub-hosted runners) which are always kept up to date by GitHub.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20
# ─────────────────────────────────────────────────────────────────────────
on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ── Step 1: Publish Core ──────────────────────────────────────────────
  publish-core:
    name: Publish Core (Java 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Verify nepal-pay-core has no parent element
        run: |
          echo "=== First 35 lines of nepal-pay-core/pom.xml ==="
          head -35 nepal-pay-core/pom.xml
          if grep -q "<parent>" nepal-pay-core/pom.xml; then
            echo "FAIL: <parent> tag found — remove it before publishing"
            exit 1
          fi
          echo "OK: no parent tag found"

      - name: Install parent POM
        run: ./mvnw install -N -q

      - name: Publish nepal-pay-core
        run: |
          ./mvnw deploy \
            -pl nepal-pay-core \
            -P release \
            -DskipTests \
            --no-transfer-progress
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  # ── Step 2a: Publish Boot 3 Starter ──────────────────────────────────
  publish-boot3:
    name: Publish Spring Boot 3 Starter (Java 17)
    runs-on: ubuntu-latest
    needs: publish-core

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Install parent and core
        run: |
          ./mvnw install -N -q
          ./mvnw clean install -pl nepal-pay-core -DskipTests -q

      - name: Publish Boot 3 starter
        run: |
          ./mvnw deploy \
            -pl nepal-pay-spring-boot-3-starter \
            -P release \
            -DskipTests \
            --no-transfer-progress
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  # ── Step 2b: Publish Boot 4 Starter ──────────────────────────────────
  publish-boot4:
    name: Publish Spring Boot 4 Starter (Java 21)
    runs-on: ubuntu-latest
    needs: publish-core

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Install parent and core
        run: |
          ./mvnw install -N -q
          ./mvnw clean install -pl nepal-pay-core -DskipTests -q

      - name: Publish Boot 4 starter
        run: |
          ./mvnw deploy \
            -pl nepal-pay-spring-boot-4-starter \
            -P release \
            -DskipTests \
            --no-transfer-progress
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  # ── Step 2c: Publish Reactive Starter ────────────────────────────────
  publish-reactive:
    name: Publish Reactive Starter (Java 17)
    runs-on: ubuntu-latest
    needs: publish-core

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Install parent and core
        run: |
          ./mvnw install -N -q
          ./mvnw clean install -pl nepal-pay-core -DskipTests -q

      - name: Publish Reactive starter
        run: |
          ./mvnw deploy \
            -pl nepal-pay-spring-boot-reactive-starter \
            -P release \
            -DskipTests \
            --no-transfer-progress
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}