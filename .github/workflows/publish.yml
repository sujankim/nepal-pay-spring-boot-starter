name: Publish to Maven Central

on:
  release:
    types: [ published ]
    workflow_dispatch:
      push:
        tags:
          - 'v*'

permissions:
  contents: read

jobs:

  # ── Step 1: Publish Core ─────────────────────────────────────────
  publish-core:
    name: Publish Core (Java 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # setup-java handles GPG import AND settings.xml automatically.
      # gpg-private-key → imported correctly regardless of newlines
      # gpg-passphrase  → env var name used in mvn command below
      # server-id       → must match publishingServerId in pom.xml ("central")
      - name: Set up Java 17 with Maven Central credentials
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Install parent POM
        run: ./mvnw install -N -q

      - name: Publish nepal-pay-core
        run: |
          ./mvnw deploy \
            -pl nepal-pay-core \
            -P release \
            -DskipTests \
            --no-transfer-progress
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  # ── Step 2a: Publish Boot 3 Starter ──────────────────────────────
  publish-boot3:
    name: Publish Spring Boot 3 Starter (Java 17)
    runs-on: ubuntu-latest
    needs: publish-core

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Java 17 with Maven Central credentials
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Install parent and core
        run: |
          ./mvnw install -N -q
          ./mvnw clean install -pl nepal-pay-core -DskipTests -q

      - name: Publish Boot 3 starter
        run: |
          ./mvnw deploy \
            -pl nepal-pay-spring-boot-3-starter \
            -P release \
            -DskipTests \
            --no-transfer-progress
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  # ── Step 2b: Publish Boot 4 Starter ──────────────────────────────
  publish-boot4:
    name: Publish Spring Boot 4 Starter (Java 21)
    runs-on: ubuntu-latest
    needs: publish-core

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21 with Maven Central credentials
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Install parent and core
        run: |
          ./mvnw install -N -q
          ./mvnw clean install -pl nepal-pay-core -DskipTests -q

      - name: Publish Boot 4 starter
        run: |
          ./mvnw deploy \
            -pl nepal-pay-spring-boot-4-starter \
            -P release \
            -DskipTests \
            --no-transfer-progress
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}